<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="student.css">
</head>
<body>
  <div>
  <div class="header">
       <h1>Student Management System</h1>
  </div>
    
   <button id="showTotal">Show Total Students</button>
  <div id="main_form">
   <form id="studentForm">
        <label for="name">Name:</label>
        <input type="text" id="name" required><br>
        
        <label for="roll">Roll:</label>
        <input type="number" id="roll" required><br>
        
        <label for="marks">Marks:</label>
        <input type="number" id="marks" min="0" max="100" required><br>
        
        <label for="course">Course:</label>
        <input type="text" id="course" required><br>
        

        <button type="submit" id="addStudent">Add Student</button>
    </form>
    <div id="studentsList">
        <table id="studentTable" border="1" cellpadding="10" cellspacing="0">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Roll</th>
                    <th>Marks</th>
                    <th>Course</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
            </tbody>
        </table>
    </div>
  </div>
  </div>
    <script src="student.js"></script>
</body>
</html>
